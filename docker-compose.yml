version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: reltor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reltor
    ports:
      - "5432:5432"
    volumes:
      - reltor_pgdata:/var/lib/postgresql/data

volumes:
  reltor_pgdata:
